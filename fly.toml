app = "your-app-name"   # change to your chosen app name
primary_region = "sin"  # Singapore — closest to PH; see fly.io/docs/reference/regions

[build]

[env]
  DATABASE_URL = "sqlite:////data/food_inventory.db"

[[mounts]]
  source = "food_data"
  destination = "/data"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
