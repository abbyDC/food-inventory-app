<div class="flex items-center justify-between mb-5">
  <h2 class="text-lg font-semibold">{{ 'Edit Item' if item else 'Add Item' }}</h2>
  <button onclick="closeSheet()" class="text-gray-400 text-2xl leading-none">&times;</button>
</div>

<form
  {% if item %}
    hx-patch="/items/{{ item.id }}"
  {% else %}
    hx-post="/items"
  {% endif %}
  hx-target="#item-list"
  hx-swap="innerHTML"
  hx-on::after-request="if(event.detail.successful) closeSheet()"
  class="space-y-4">

  <!-- Name -->
  <div>
    <label class="block text-sm font-medium text-gray-700 mb-1">Name <span class="text-red-500">*</span></label>
    <input type="text" name="name" required
      value="{{ item.name if item else '' }}"
      placeholder="e.g. Eggs, Orange juice"
      class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-green-500" />
  </div>

  <!-- Category -->
  <div>
    <label class="block text-sm font-medium text-gray-700 mb-1">Category</label>
    <input type="text" name="category"
      value="{{ item.category if item and item.category else '' }}"
      placeholder="e.g. Dairy, Produce, Pantry"
      class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-green-500" />
  </div>

  <!-- Quantity + Unit -->
  <div class="flex gap-3">
    <div class="flex-1">
      <label class="block text-sm font-medium text-gray-700 mb-1">Quantity <span class="text-red-500">*</span></label>
      <input type="number" name="quantity" required min="0" step="0.1"
        value="{{ item.quantity if item else '1' }}"
        class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-green-500" />
    </div>
    <div class="flex-1">
      <label class="block text-sm font-medium text-gray-700 mb-1">Unit</label>
      <input type="text" name="unit"
        value="{{ item.unit if item else 'units' }}"
        placeholder="units, g, ml, oz"
        class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-green-500" />
    </div>
  </div>

  <!-- Bought date -->
  <div>
    <label class="block text-sm font-medium text-gray-700 mb-1">Date Bought</label>
    <input type="date" name="bought_at"
      value="{{ item.bought_at.strftime('%Y-%m-%d') if item and item.bought_at else today_str }}"
      class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-green-500" />
  </div>

  <!-- Expiry date -->
  <div>
    <label class="block text-sm font-medium text-gray-700 mb-1">Expiry Date</label>
    <input type="date" name="expires_at"
      value="{{ item.expires_at.strftime('%Y-%m-%d') if item and item.expires_at else '' }}"
      class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-green-500" />
  </div>

  <!-- Low stock threshold -->
  <div>
    <label class="block text-sm font-medium text-gray-700 mb-1">Low Stock Alert (quantity)</label>
    <input type="number" name="low_stock_at" min="0" step="0.1"
      value="{{ item.low_stock_at if item and item.low_stock_at else '' }}"
      placeholder="e.g. 2 — alert when below this"
      class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-green-500" />
  </div>

  <button type="submit"
    class="w-full bg-green-600 text-white font-semibold py-3 rounded-xl text-sm mt-2">
    {{ 'Save Changes' if item else 'Add Item' }}
  </button>

</form>

{% if item %}
<button
  hx-delete="/items/{{ item.id }}"
  hx-target="#item-list"
  hx-swap="innerHTML"
  hx-confirm="Delete {{ item.name }}? This can't be undone."
  hx-on::after-request="if(event.detail.successful) closeSheet()"
  class="w-full mt-3 bg-red-50 text-red-600 font-semibold py-3 rounded-xl text-sm">
  Delete Item
</button>
{% endif %}
