<div class="flex items-center justify-between mb-5">
  <h2 id="form-title" class="text-lg font-semibold">Add Item</h2>
  <button onclick="closeSheet()" class="text-gray-400 text-2xl leading-none">&times;</button>
</div>

<form id="item-form" class="space-y-4">

  <!-- Name -->
  <div>
    <label class="block text-sm font-medium text-gray-700 mb-1">Name <span class="text-red-500">*</span></label>
    <input type="text" name="name" id="field-name" required
      placeholder="e.g. Eggs, Orange juice"
      class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-green-500" />
  </div>

  <!-- Category -->
  <div>
    <label class="block text-sm font-medium text-gray-700 mb-1">Category</label>
    <input type="text" name="category" id="field-category"
      placeholder="e.g. Dairy, Produce, Pantry"
      class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-green-500" />
  </div>

  <!-- Quantity + Unit -->
  <div class="flex gap-3">
    <div class="flex-1">
      <label class="block text-sm font-medium text-gray-700 mb-1">Quantity <span class="text-red-500">*</span></label>
      <input type="number" name="quantity" id="field-quantity" required min="0" step="0.1" value="1"
        class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-green-500" />
    </div>
    <div class="flex-1">
      <label class="block text-sm font-medium text-gray-700 mb-1">Unit</label>
      <input type="text" name="unit" id="field-unit" value="units"
        placeholder="units, g, ml, oz"
        class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-green-500" />
    </div>
  </div>

  <!-- Bought date -->
  <div>
    <label class="block text-sm font-medium text-gray-700 mb-1">Date Bought</label>
    <input type="date" name="bought_at" id="field-bought-at"
      value="{{ today_str }}"
      class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-green-500" />
  </div>

  <!-- Expiry date -->
  <div>
    <label class="block text-sm font-medium text-gray-700 mb-1">Expiry Date</label>
    <input type="date" name="expires_at" id="field-expires-at"
      class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-green-500" />
  </div>

  <!-- Low stock threshold -->
  <div>
    <label class="block text-sm font-medium text-gray-700 mb-1">Low Stock Alert (quantity)</label>
    <input type="number" name="low_stock_at" id="field-low-stock-at" min="0" step="0.1"
      placeholder="e.g. 2 — alert when below this"
      class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-green-500" />
  </div>

  <button id="submit-btn" type="submit"
    class="w-full bg-green-600 text-white font-semibold py-3 rounded-xl text-sm mt-2">
    Add Item
  </button>

</form>

<button id="delete-btn"
  class="hidden w-full mt-3 bg-red-50 text-red-600 font-semibold py-3 rounded-xl text-sm">
  Delete Item
</button>

<script>
(function () {
  var item = window._editItem || null;

  if (item) {
    document.getElementById('form-title').textContent = 'Edit Item';
    document.getElementById('submit-btn').textContent = 'Save Changes';
    document.getElementById('field-name').value = item.name || '';
    document.getElementById('field-category').value = item.category || '';
    document.getElementById('field-quantity').value = item.quantity != null ? item.quantity : 1;
    document.getElementById('field-unit').value = item.unit || 'units';
    document.getElementById('field-bought-at').value = item.bought_at || '';
    document.getElementById('field-expires-at').value = item.expires_at || '';
    document.getElementById('field-low-stock-at').value = item.low_stock_at != null ? item.low_stock_at : '';
    document.getElementById('delete-btn').classList.remove('hidden');
  }

  document.getElementById('item-form').addEventListener('submit', function (e) {
    e.preventDefault();
    var fd = new FormData(this);
    var data = Object.fromEntries(fd.entries());
    if (item) {
      Store.updateItem(item.id, data);
    } else {
      Store.createItem(data);
    }
    Render.itemList();
    closeSheet();
  });

  document.getElementById('delete-btn').addEventListener('click', function () {
    if (item && confirm('Delete ' + item.name + '? This can\'t be undone.')) {
      Store.deleteItem(item.id);
      Render.itemList();
      closeSheet();
    }
  });
})();
</script>
